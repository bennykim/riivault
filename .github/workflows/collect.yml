name: collect

# Durable, serverless collection: runs the incremental collect + aggregate +
# compliance purge on a schedule. No always-on host required — the DB is a
# managed Postgres (Neon/Supabase), reachable over SSL from the runner.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   DATABASE_URL          managed Postgres connection string (required)
#   REDDIT_CLIENT_ID      Reddit app id      (optional until API approval — Reddit step no-ops without it)
#   REDDIT_CLIENT_SECRET  Reddit app secret
#   REDDIT_USER_AGENT     e.g. "web:riivault:v0.1 (by /u/yourname)"
#   ANTHROPIC_API_KEY     optional — enables LLM VoC extraction (else VADER only)
#   VOYAGE_API_KEY        optional — enables semantic VoC dedup via Voyage
#                         embeddings (else exact text match only)
#   GH_API_TOKEN          optional — GitHub PAT for 5000 req/hr (60/hr without).
#                         Actions reserves the GITHUB_ prefix, hence the name.
#   PRODUCTHUNT_TOKEN     optional — PH developer token; PH step no-ops without it

on:
  schedule:
    - cron: "0 */2 * * *" # every 2 hours (UTC)
  workflow_dispatch: {} # manual "Run workflow" button

# Never overlap two collection runs.
concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
      GH_API_TOKEN: ${{ secrets.GH_API_TOKEN }}
      PRODUCTHUNT_TOKEN: ${{ secrets.PRODUCTHUNT_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Sync entity catalog (entities.yaml -> entity table)
        run: uv run riivault sync-entities

      - name: Collect Reddit (no-op until API approved)
        run: uv run riivault collect-once

      - name: Collect Hacker News
        run: uv run riivault collect-hn

      - name: Collect GitHub Issues (product feedback)
        run: uv run riivault collect-gh

      - name: Collect Product Hunt launches (no-op without token)
        run: uv run riivault collect-ph

      - name: Collect adoption metrics (stars / releases / downloads / SE questions)
        run: uv run riivault collect-adoption

      - name: Aggregate derived time-series (Reddit + HN + GitHub + PH)
        run: uv run riivault aggregate

      - name: Detect emerging signals (statistical; no-op until baselines mature)
        run: uv run riivault detect-signals

      - name: Purge expired / deleted raw content (48h compliance)
        run: uv run riivault purge
