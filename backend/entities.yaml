# riivault entity catalog — the single source of truth for what we track.
#
# Applied by `riivault sync-entities` (idempotent upsert on (type, name));
# the collect workflow runs it before every collection pass, so editing this
# file + pushing is the only step needed to onboard or update an entity.
# Entities absent from this file are NOT deleted (non-destructive sync).
#
# Field reference (all optional except type/name):
#   aliases   extra match terms for the discourse matcher (canonical name is
#             always matched; keep terms unambiguous — common English words
#             like "Make", "Linear", "Bubble" false-match everywhere)
#   tracked   true → shown in the TrackedRail/Ticker UI (keep this list short)
#   context   display community label (UI only)
#   repo      owner/name → GitHub Issues feedback + stars/releases adoption
#   npm       package    → npm downloads adoption series
#   pypi      package    → PyPI downloads adoption series
#   se_tag    Stack Overflow tag → new-questions adoption series
#
# Every repo/npm/pypi/se_tag below was verified to exist on 2026-07-23.

entities:
  # ---- original catalog (values mirror the live DB as of 2026-07-23) ----
